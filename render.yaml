services:
  # ── Backend: Node.js Express ───────────────────────────────────────────────
  - type: web
    name: campuspaws-backend
    env: node
    plan: free
    region: ohio
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL # Initially manually overridden in Render dashboard
        value: https://campus-paws.onrender.com

  # ── Frontend: Static Site ──────────────────────────────────────────────────
  - type: web
    name: campuspaws-frontend
    env: static
    plan: free
    region: ohio
    buildCommand: "cd frontend && npm install && npm run build"
    publishDir: "frontend/dist"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: campuspaws-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
